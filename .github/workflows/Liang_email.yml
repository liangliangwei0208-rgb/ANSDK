name: Liang Email

on:
  schedule:
    # 每 6 小时运行一次；cron 按 UTC 计算
    # 北京时间约为 08:00 / 14:00 / 20:00 / 02:00
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-liang-email:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    env:
      TZ: Asia/Shanghai
      QQ_EMAIL_ACCOUNT: ${{ secrets.QQ_EMAIL_ACCOUNT }}
      QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime folders
        run: |
          mkdir -p output
          mkdir -p cache

      - name: Run Liang email script
        run: |
          python -u main.py
