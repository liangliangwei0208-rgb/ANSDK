name: Liang Email

on:
  schedule:
    # 北京时间 07:00 = UTC 00:30，周一至周六
    - cron: "00 23 * * 1-6"

    # 北京时间 09:00 = UTC 04:00，周一至周六
    - cron: "0 1 * * 1-6"

    # 北京时间 12:10 = UTC 08:10，周一至周六
    - cron: "30 7 * * 1-6"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: liang-email
  cancel-in-progress: true

jobs:
  run-liang-email:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    env:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
      QQ_EMAIL_ACCOUNT: ${{ secrets.QQ_EMAIL_ACCOUNT }}
      QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime folders
        run: |
          mkdir -p output
          mkdir -p cache

      - name: Run Liang email script
        run: |
          python -u main.py

      - name: Commit runtime cache
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add cache/*.json investment_quote_history.json || true

          if git diff --cached --quiet; then
            echo "No runtime cache changes"
          else
            git commit -m "Update runtime cache"
            git pull --rebase || true
            git push
          fi
