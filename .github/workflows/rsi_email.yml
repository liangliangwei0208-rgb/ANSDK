name: Liang Email

on:
  schedule:
    # 每 3 小时运行一次；默认按 UTC 计算
    - cron: "0 */4.5 * * *"

  # 允许在 GitHub 网页手动运行
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-rsi-email:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TZ: Asia/Shanghai
      QQ_EMAIL_ACCOUNT: ${{ secrets.QQ_EMAIL_ACCOUNT }}
      QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime folders
        run: |
          mkdir -p output
          mkdir -p cache

      - name: Run RSI email script
        run: |
          python main.py
